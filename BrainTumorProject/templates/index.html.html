<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Tumor Detection AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.19/latin.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #0b1120 0%, #0f172a 100%); }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .glow-btn { box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transition: all 0.3s ease; }
    .glow-btn:hover { box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); transform: translateY(-2px); }
    .glow-btn:active { transform: translateY(0); }
    .upload-zone { border: 2px dashed #334155; transition: all 0.3s ease; background: rgba(30, 41, 59, 0.5); }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
    .heatmap-overlay { mix-blend-mode: screen; pointer-events: none; transition: opacity 0.5s ease; }
    .confidence-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes pulse-ring { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.2; } 100% { transform: scale(0.9); opacity: 0.6; } }
    .loading-ring { animation: pulse-ring 1.5s ease-in-out infinite; }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen text-slate-200 selection:bg-sky-500/30">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    // Icons
    const UploadIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    );
    const BrainIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-2.5-2.5V2.5z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 2.5-2.5V2.5z"/><path d="M12 4.5V22"/><path d="M12 2v2.5"/><path d="M22 12h-4"/><path d="M2 12h4"/><path d="M20 6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6z"/><path d="M20 16a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2z"/></svg>
    );
    const InfoIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>
    );
    const CheckIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    );
    const AlertIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    );

    const App = () => {
      const [file, setFile] = useState(null);
      const [preview, setPreview] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [showGuide, setShowGuide] = useState(false);
      const fileInputRef = useRef(null);

      const handleDrag = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") setIsDragging(true);
        else if (e.type === "dragleave") setIsDragging(false);
      }, []);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          processFile(e.dataTransfer.files[0]);
        }
      }, []);

      const processFile = (selectedFile) => {
        if (!selectedFile.type.startsWith("image/")) {
          alert("Please upload a valid image file (JPEG, PNG, etc.)");
          return;
        }
        setFile(selectedFile);
        setPreview(URL.createObjectURL(selectedFile));
        setResult(null);
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          processFile(e.target.files[0]);
        }
      };

      const analyzeImage = async () => {
        if (!file) return;
        setLoading(true);

        // MOCK BACKEND CALL - Replace with real fetch to Flask API
        try {
          // Simulate network & model inference delay
          await new Promise(res => setTimeout(res, 2200));
          
          // Mock prediction logic
          const isTumor = Math.random() > 0.45; 
          const confidence = isTumor 
            ? (88 + Math.random() * 11).toFixed(2) 
            : (82 + Math.random() * 14).toFixed(2);
            
          setResult({
            prediction: isTumor ? "Tumor Detected" : "No Tumor Found",
            confidence: parseFloat(confidence),
            type: isTumor ? "tumor" : "healthy",
            heatmap: generateMockHeatmap(isTumor)
          });
        } catch (err) {
          console.error("Analysis failed:", err);
          setResult({ prediction: "Error", confidence: 0, type: "error" });
        } finally {
          setLoading(false);
        }
      };

      // Generates a pseudo Grad-CAM overlay using canvas for demo purposes
      const generateMockHeatmap = (hasTumor) => {
        if (!hasTumor) return null;
        const cx = 35 + Math.random() * 30;
        const cy = 35 + Math.random() * 30;
        return { x: cx, y: cy, radius: 25 + Math.random() * 15 };
      };

      const resetApp = () => {
        setFile(null);
        setPreview(null);
        setResult(null);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      return (
        <div className="max-w-6xl mx-auto px-4 py-8 md:py-12 min-h-screen flex flex-col">
          {/* Header */}
          <header className="flex justify-between items-center mb-12">
            <div className="flex items-center gap-3">
              <div className="p-2 bg-sky-500/10 rounded-xl border border-sky-500/20">
                <BrainIcon />
              </div>
              <div>
                <h1 className="text-2xl font-bold tracking-tight text-white">NeuroScan <span className="text-sky-400">AI</span></h1>
                <p className="text-sm text-slate-400">MRI Brain Tumor Detection System</p>
              </div>
            </div>
            <button 
              onClick={() => setShowGuide(!showGuide)}
              className="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-colors text-sm"
            >
              <InfoIcon />
              <span>Setup Guide</span>
            </button>
          </header>

          {/* Guide Modal / Section */}
          {showGuide && (
            <div className="fade-in mb-8 glass-panel rounded-2xl p-6 border-l-4 border-l-sky-500">
              <h3 className="text-lg font-semibold mb-3 text-sky-300">Backend Integration & Setup</h3>
              <div className="grid md:grid-cols-2 gap-6 text-sm">
                <div>
                  <h4 className="font-medium text-white mb-2">1. Flask Backend Setup</h4>
                  <ul className="list-disc pl-5 space-y-1 text-slate-400">
                    <li>Install: <code>pip install flask tensorflow keras numpy pillow</code></li>
                    <li>Run: <code>python backend/app.py</code></li>
                    <li>Ensure CORS is enabled or proxy requests in production.</li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-medium text-white mb-2">2. API Request Example (Postman/cURL)</h4>
                  <pre className="bg-black/40 p-3 rounded-lg overflow-x-auto text-xs font-mono text-sky-200 border border-slate-700/50">
                    POST http://localhost:5000/predict<br/>
                    Content-Type: multipart/form-data<br/>
                    Body: key="file" → select image.jpg
                  </pre>
                  <p className="mt-2 text-slate-500">Response: <code className="text-slate-300">{"{ prediction: 'Tumor', confidence: 0.94 }"}</code></p>
                </div>
              </div>
            </div>
          )}

          {/* Main Content */}
          <main className="flex-1 grid md:grid-cols-2 gap-8 items-start">
            
            {/* Upload Section */}
            <div className="space-y-6">
              <div className="glass-panel rounded-2xl p-1">
                <div 
                  className={`upload-zone rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer min-h-[320px] relative overflow-hidden ${isDragging ? 'border-sky-400 bg-sky-500/10' : ''}`}
                  onDragEnter={handleDrag}
                  onDragOver={handleDrag}
                  onDragLeave={handleDrag}
                  onDrop={handleDrop}
                  onClick={() => fileInputRef.current.click()}
                >
                  <input 
                    type="file" 
                    accept="image/*" 
                    ref={fileInputRef} 
                    onChange={handleFileChange} 
                    className="hidden" 
                  />
                  
                  {preview ? (
                    <div className="relative w-full h-72 rounded-lg overflow-hidden shadow-2xl border border-slate-700/50 group">
                      <img src={preview} alt="Uploaded MRI" className="w-full h-full object-cover opacity-90 group-hover:scale-105 transition-transform duration-500" />
                      {result?.heatmap && (
                        <div className="absolute inset-0 heatmap-overlay" style={{ background: `radial-gradient(circle at ${result.heatmap.x}% ${result.heatmap.y}%, rgba(239, 68, 68, 0.6) 0%, rgba(239, 68, 68, 0.1) ${result.heatmap.radius}%, transparent 70%)` }} />
                      )}
                      {loading && (
                        <div className="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                          <div className="w-12 h-12 border-4 border-sky-400 border-t-transparent rounded-full loading-ring"></div>
                        </div>
                      )}
                      {!loading && !result && (
                        <div className="absolute bottom-3 right-3 px-3 py-1 bg-black/60 backdrop-blur rounded-full text-xs font-medium text-sky-300 border border-white/10">
                          Click to Replace
                        </div>
                      )}
                    </div>
                  ) : (
                    <>
                      <div className="w-16 h-16 mb-4 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 text-slate-400">
                        <UploadIcon />
                      </div>
                      <h3 className="text-lg font-semibold text-slate-200">Upload MRI Scan</h3>
                      <p className="text-slate-500 mt-1 text-sm">Drag & drop an image here, or click to browse</p>
                      <p className="text-slate-600 mt-3 text-xs">Supports: JPG, PNG, DICOM (converted)</p>
                    </>
                  )}
                </div>
              </div>

              <div className="flex gap-3">
                <button 
                  onClick={analyzeImage}
                  disabled={!file || loading}
                  className={`flex-1 py-3 px-6 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all ${!file || loading ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-gradient-to-r from-sky-500 to-cyan-500 text-white glow-btn'}`}
                >
                  {loading ? (
                    <>
                      <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                      Analyzing...
                    </>
                  ) : (
                    <>Run Inference</>
                  )}
                </button>
                {file && !loading && (
                  <button onClick={resetApp} className="px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 transition-colors">
                    Reset
                  </button>
                )}
              </div>
            </div>

            {/* Results Section */}
            <div className="space-y-6">
              <div className="glass-panel rounded-2xl p-6 min-h-[320px] flex flex-col">
                <h2 className="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                  Analysis Results
                  {result && <span className="px-2 py-0.5 text-xs rounded-full bg-sky-500/20 text-sky-300 border border-sky-500/30">CNN V1.0</span>}
                </h2>

                {!result && !loading && (
                  <div className="flex-1 flex flex-col items-center justify-center text-slate-500 opacity-60">
                    <div className="w-16 h-16 mb-3 rounded-full border-2 border-dashed border-slate-700 flex items-center justify-center">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 3.86 3 7 7 7s7-3.14 7-7a7 7 0 0 0-7-7z"/></svg>
                    </div>
                    <p className="text-sm">Upload an MRI scan and run inference to view results.</p>
                  </div>
                )}

                {loading && (
                  <div className="flex-1 flex flex-col items-center justify-center gap-4">
                    <div className="relative">
                      <div className="w-20 h-20 rounded-full border-4 border-slate-700 border-t-sky-500 loading-ring"></div>
                      <div className="absolute inset-0 flex items-center justify-center text-sky-400 font-bold text-lg">AI</div>
                    </div>
                    <div className="text-center">
                      <p className="text-slate-300 font-medium">Processing MRI Slice...</p>
                      <p className="text-xs text-slate-500 mt-1">Resizing → Normalizing → Predicting</p>
                    </div>
                  </div>
                )}

                {result && !loading && (
                  <div className="fade-in flex-1 flex flex-col gap-6">
                    {/* Prediction Card */}
                    <div className={`p-4 rounded-xl border flex items-center gap-4 ${result.type === 'tumor' ? 'bg-rose-500/10 border-rose-500/30' : 'bg-emerald-500/10 border-emerald-500/30'}`}>
                      <div className={`p-3 rounded-lg ${result.type === 'tumor' ? 'bg-rose-500/20 text-rose-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                        {result.type === 'tumor' ? <AlertIcon /> : <CheckIcon />}
                      </div>
                      <div>
                        <p className="text-sm text-slate-400">Model Prediction</p>
                        <p className={`text-2xl font-bold ${result.type === 'tumor' ? 'text-rose-400' : 'text-emerald-400'}`}>
                          {result.prediction}
                        </p>
                      </div>
                    </div>

                    {/* Confidence Bar */}
                    <div className="space-y-2">
                      <div className="flex justify-between text-sm">
                        <span className="text-slate-400">Confidence Score</span>
                        <span className="text-white font-mono">{result.confidence}%</span>
                      </div>
                      <div className="h-3 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                        <div 
                          className={`h-full rounded-full confidence-bar ${result.type === 'tumor' ? 'bg-gradient-to-r from-rose-500 to-rose-400' : 'bg-gradient-to-r from-emerald-500 to-emerald-400'}`}
                          style={{ width: `${result.confidence}%` }}
                        ></div>
                      </div>
                    </div>

                    {/* Grad-CAM / Metadata */}
                    <div className="grid grid-cols-2 gap-3 mt-2">
                      <div className="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <p className="text-xs text-slate-500 mb-1">Model Architecture</p>
                        <p className="text-sm font-medium text-slate-200">CNN (Conv2D x2 + Pool)</p>
                      </div>
                      <div className="bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                        <p className="text-xs text-slate-500 mb-1">Input Size</p>
                        <p className="text-sm font-medium text-slate-200">128 x 128 px</p>
                      </div>
                      {result.type === 'tumor' && (
                        <div className="col-span-2 bg-slate-800/50 p-3 rounded-lg border border-slate-700/50 flex items-center gap-2">
                          <div className="w-2 h-2 rounded-full bg-rose-400 animate-pulse"></div>
                          <p className="text-xs text-slate-300">Grad-CAM heatmap overlay highlights suspected region.</p>
                        </div>
                      )}
                    </div>

                    <div className="mt-auto pt-4 border-t border-slate-800 flex justify-between items-center text-xs text-slate-500">
                      <span>Processed by Flask API Mock</span>
                      <button onClick={resetApp} className="text-sky-400 hover:text-sky-300 transition-colors">Analyze Another</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="mt-12 text-center text-xs text-slate-600 border-t border-slate-800 pt-6">
            <p>For educational purposes only. Not a substitute for professional medical diagnosis.</p>
            <p className="mt-1">Built with React + Tailwind CSS | Simulated CNN Backend</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
